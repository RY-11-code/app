<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我的帳本">
<title>我的帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE8;
  --border: #E5E0D8;
  --text: #1A1814;
  --text2: #6B6560;
  --text3: #A8A39C;
  --green: #2D8A5E;
  --green-bg: #EAF5EF;
  --red: #C0392B;
  --red-bg: #FDECEA;
  --blue: #2563EB;
  --blue-bg: #EFF6FF;
  --amber: #B45309;
  --amber-bg: #FFFBEB;
  --purple: #6D28D9;
  --purple-bg: #F5F3FF;
  --accent: #1A1814;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
}

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; max-width: 430px; margin: 0 auto; position: relative; }
.content { flex: 1; overflow-y: auto; padding: 16px 16px 90px; -webkit-overflow-scrolling: touch; }
.content::-webkit-scrollbar { display: none; }

/* Nav */
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 8px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-family: inherit; transition: color 0.2s; }
.nav-btn.active { color: var(--text); }
.nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }

/* Page header */
.page-header { margin-bottom: 20px; }
.page-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.page-header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
.card-row { display: flex; justify-content: space-between; align-items: center; }
.card-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.card-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.card-sub { font-size: 12px; color: var(--text3); }

/* Summary grid */
.sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.sum-card .label { font-size: 11px; color: var(--text2); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
.sum-card .val { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.val.green { color: var(--green); }
.val.red { color: var(--red); }

/* Chip tags */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.chip.green { background: var(--green-bg); color: var(--green); }
.chip.red { background: var(--red-bg); color: var(--red); }
.chip.blue { background: var(--blue-bg); color: var(--blue); }
.chip.amber { background: var(--amber-bg); color: var(--amber); }
.chip.purple { background: var(--purple-bg); color: var(--purple); }
.chip.gray { background: var(--surface2); color: var(--text2); }

/* List items */
.list-item { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); }
.list-item:last-child { border-bottom: none; }
.item-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.item-body { flex: 1; min-width: 0; }
.item-title { font-size: 14px; font-weight: 500; }
.item-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.item-right { text-align: right; flex-shrink: 0; }
.item-amount { font-size: 15px; font-weight: 700; }
.item-time { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Progress bar */
.progress-wrap { margin-top: 10px; }
.progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.progress-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; color: var(--text3); }

/* FAB */
.fab { position: fixed; bottom: 80px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: white; border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 40; transition: transform 0.15s; }
.fab:active { transform: scale(0.92); }

/* Section title */
.section-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; color: var(--text2); text-transform: uppercase; margin: 20px 0 10px; }

/* Add button */
.btn-add { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; background: var(--text); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; margin-bottom: 10px; transition: opacity 0.15s; }
.btn-add:active { opacity: 0.85; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }

/* Modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
.overlay.open { display: flex; }
.sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); max-height: 90vh; overflow-y: auto; }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.sheet h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field select, .field textarea {
  width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 15px; background: var(--bg); color: var(--text); font-family: inherit; appearance: none;
}
.field textarea { resize: none; height: 72px; }
.field input:focus, .field select:focus { outline: none; border-color: var(--text); }
.type-row { display: flex; gap: 8px; }
.type-btn { flex: 1; padding: 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; cursor: pointer; background: var(--bg); color: var(--text2); font-weight: 500; transition: all 0.15s; }
.type-btn.on-exp { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.type-btn.on-inc { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel2 { flex: 1; padding: 13px; background: var(--surface2); border: none; border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 500; color: var(--text2); }
.btn-save2 { flex: 2; padding: 13px; background: var(--text); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn-danger { background: var(--red); }

/* Delete btn */
.del-btn { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px 6px; }

/* Todo */
.todo-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.todo-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; }
.todo-check.done { background: var(--green); border-color: var(--green); }
.todo-check.done::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
.todo-text { flex: 1; font-size: 14px; }
.todo-text.done { text-decoration: line-through; color: var(--text3); }
.todo-tag { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Rate tool */
.rate-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.rate-input-row { display: flex; gap: 8px; align-items: center; }
.rate-input-row input { flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 20px; font-weight: 700; background: var(--bg); color: var(--text); font-family: inherit; text-align: right; }
.rate-currency { font-size: 13px; font-weight: 700; color: var(--text2); min-width: 36px; text-align: center; }
.rate-arrow { font-size: 20px; color: var(--text3); text-align: center; padding: 8px 0; }
.rate-result { font-size: 32px; font-weight: 700; letter-spacing: -1px; text-align: right; color: var(--text); padding: 8px 0; }
.rate-updated { font-size: 11px; color: var(--text3); text-align: right; }
.rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
.rate-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s; }
.rate-item.active { border-color: var(--text); }
.rate-item .pair { font-size: 12px; font-weight: 700; color: var(--text2); }
.rate-item .rate-val { font-size: 16px; font-weight: 700; margin-top: 2px; }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
.empty .icon { font-size: 36px; margin-bottom: 8px; }

/* Page */
.page { display: none; }
.page.active { display: block; }

/* Net worth big number */
.net-big { font-size: 38px; font-weight: 700; letter-spacing: -1.5px; margin: 4px 0 8px; }
</style>
</head>
<body>
<div class="app">
  <div class="content" id="content">
    <!-- Pages rendered by JS -->
  </div>

  <!-- FAB for adding -->
  <button class="fab" id="fab" onclick="openAdd()">+</button>

  <nav class="nav">
    <button class="nav-btn active" onclick="setPage(0)" id="nav0">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      總覽
    </button>
    <button class="nav-btn" onclick="setPage(1)" id="nav1">
      <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>
      記帳
    </button>
    <button class="nav-btn" onclick="setPage(2)" id="nav2">
      <svg viewBox="0 0 24 24"><path d="M2 12h6l2 6 4-12 2 6h6"/></svg>
      負債
    </button>
    <button class="nav-btn" onclick="setPage(3)" id="nav3">
      <svg viewBox="0 0 24 24"><path d="M12 22V12M12 12L8 16M12 12l4 4M4 6h16M4 10h16"/></svg>
      資產
    </button>
    <button class="nav-btn" onclick="setPage(4)" id="nav4">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      更多
    </button>
  </nav>
</div>

<!-- Overlay sheet -->
<div class="overlay" id="overlay" onclick="closeOverlayBg(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<script>
// ── Storage ──
const DB = {
  get(k){ try{return JSON.parse(localStorage.getItem(k))||[];}catch{return [];} },
  getObj(k,d={}){ try{return JSON.parse(localStorage.getItem(k))||d;}catch{return d;} },
  set(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
};

let records = DB.get('fin_records');
let debts = DB.get('fin_debts');
let assets = DB.get('fin_assets');
let goals = DB.get('fin_goals');
let todos = DB.get('fin_todos');
let fixed = DB.get('fin_fixed');

function saveAll(){
  DB.set('fin_records',records);
  DB.set('fin_debts',debts);
  DB.set('fin_assets',assets);
  DB.set('fin_goals',goals);
  DB.set('fin_todos',todos);
  DB.set('fin_fixed',fixed);
}

// ── Nav ──
let currentPage = 0;
const pages = ['renderOverview','renderLedger','renderDebt','renderAssets','renderMore'];
const FAB_PAGES = [false,true,true,true,false];

function setPage(i){
  currentPage = i;
  document.querySelectorAll('.nav-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
  document.getElementById('fab').style.display = FAB_PAGES[i] ? 'flex' : 'none';
  window[pages[i]]();
}

function render(){ window[pages[currentPage]](); }

// ── Helpers ──
const fmt = n => 'NT$' + Math.round(n).toLocaleString();
const now = () => { const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,16); };
const thisYM = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

const CATS_EXP = ['🍜 餐飲','🚇 交通','🛒 購物','🎬 娛樂','🏥 醫療','📱 訂閱','🏠 住宿','📚 教育','💡 水電','✈️ 旅遊','👕 服飾','其他'];
const CATS_INC = ['💼 薪資','💰 獎金','📈 投資','🎁 禮金','💵 兼職','其他收入'];
const DEBT_TYPES = ['信用卡','分期貸款','私人借款','其他'];
const ASSET_TYPES = ['存款','股票/ETF','基金','現金','其他'];

function iconFor(cat){ const m=cat.match(/[\p{Emoji}]/u); return m?m[0]:'📋'; }

// ── Page 0: Overview ──
function renderOverview(){
  const ym = thisYM();
  let inc=0, exp=0;
  records.forEach(r=>{ if((r.date||'').startsWith(ym)){ if(r.type==='income') inc+=r.amount; else exp+=r.amount; } });
  const totalDebt = debts.reduce((s,d)=>s+(d.remaining||0),0);
  const totalAsset = assets.reduce((s,a)=>s+(a.amount||0),0);
  const totalFixed = fixed.reduce((s,f)=>s+(f.amount||0),0);
  const net = totalAsset - totalDebt;

  document.getElementById('content').innerHTML = `
  <div class="page-header">
    <h1>財務總覽</h1>
    <p>${new Date().getFullYear()} 年 ${new Date().getMonth()+1} 月</p>
  </div>

  <div class="card" style="background:var(--text);color:white;border-color:var(--text)">
    <div class="card-label" style="color:rgba(255,255,255,0.6)">淨資產</div>
    <div class="net-big" style="color:white">${fmt(net)}</div>
    <div style="display:flex;gap:16px;font-size:12px;color:rgba(255,255,255,0.6)">
      <span>資產 ${fmt(totalAsset)}</span>
      <span>負債 ${fmt(totalDebt)}</span>
    </div>
  </div>

  <div class="sum-grid">
    <div class="sum-card">
      <div class="label">本月收入</div>
      <div class="val green">${fmt(inc)}</div>
    </div>
    <div class="sum-card">
      <div class="label">本月支出</div>
      <div class="val red">${fmt(exp)}</div>
    </div>
    <div class="sum-card">
      <div class="label">每月固定支出</div>
      <div class="val" style="color:var(--amber)">${fmt(totalFixed)}</div>
    </div>
    <div class="sum-card">
      <div class="label">負債總額</div>
      <div class="val red">${fmt(totalDebt)}</div>
    </div>
  </div>

  ${goals.length ? `
  <div class="section-title">存錢目標</div>
  ${goals.map(g=>{
    const pct = Math.min(100,Math.round((g.saved/g.target)*100));
    return `<div class="card">
      <div class="card-row"><span style="font-weight:600">${g.name}</span><span class="chip ${pct>=100?'green':'blue'}">${pct}%</span></div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--${pct>=100?'green':'blue'})"></div></div>
        <div class="progress-labels"><span>${fmt(g.saved)}</span><span>${fmt(g.target)}</span></div>
      </div>
    </div>`;
  }).join('')}` : ''}

  ${todos.filter(t=>!t.done).length ? `
  <div class="section-title">待辦提醒</div>
  <div class="card">
    ${todos.filter(t=>!t.done).slice(0,3).map(t=>`
    <div class="list-item">
      <div class="item-icon" style="background:var(--amber-bg);font-size:16px">📌</div>
      <div class="item-body"><div class="item-title">${t.text}</div></div>
    </div>`).join('')}
  </div>` : ''}
  `;
}

// ── Page 1: Ledger ──
function renderLedger(){
  const ym = thisYM();
  let inc=0, exp=0;
  const sorted = [...records].sort((a,b)=>new Date(b.date)-new Date(a.date));
  sorted.forEach(r=>{ if((r.date||'').startsWith(ym)){ if(r.type==='income') inc+=r.amount; else exp+=r.amount; } });

  document.getElementById('content').innerHTML = `
  <div class="page-header">
    <h1>記帳</h1>
    <p>${new Date().getFullYear()} 年 ${new Date().getMonth()+1} 月</p>
  </div>
  <div class="sum-grid">
    <div class="sum-card"><div class="label">收入</div><div class="val green">${fmt(inc)}</div></div>
    <div class="sum-card"><div class="label">支出</div><div class="val red">${fmt(exp)}</div></div>
  </div>
  <div class="section-title">近期記錄</div>
  <div class="card">
    ${sorted.length===0?`<div class="empty"><div class="icon">📝</div>還沒有記錄</div>`:
    sorted.slice(0,50).map(r=>{
      const d=new Date(r.date);
      const ts=(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
      const inc=r.type==='income';
      return `<div class="list-item">
        <div class="item-icon" style="background:${inc?'var(--green-bg)':'var(--red-bg)'}">${iconFor(r.category)}</div>
        <div class="item-body">
          <div class="item-title">${r.category}</div>
          <div class="item-sub">${r.note||'—'}</div>
        </div>
        <div class="item-right">
          <div class="item-amount" style="color:${inc?'var(--green)':'var(--red)'}">${inc?'+':'-'}${fmt(r.amount)}</div>
          <div class="item-time">${ts}</div>
        </div>
        <button class="del-btn" onclick="delRecord('${r.id}')">×</button>
      </div>`;
    }).join('')}
  </div>`;
}

function delRecord(id){ if(!confirm('刪除這筆記錄？'))return; records=records.filter(r=>r.id!==id); saveAll(); renderLedger(); }

// ── Page 2: Debt ──
function renderDebt(){
  const totalDebt = debts.reduce((s,d)=>s+(d.remaining||0),0);
  const totalMonthly = debts.reduce((s,d)=>s+(d.monthly||0),0) + fixed.reduce((s,f)=>s+(f.amount||0),0);

  document.getElementById('content').innerHTML = `
  <div class="page-header"><h1>負債管理</h1><p>包含貸款、卡費、固定支出</p></div>
  <div class="sum-grid">
    <div class="sum-card"><div class="label">負債總額</div><div class="val red">${fmt(totalDebt)}</div></div>
    <div class="sum-card"><div class="label">每月應繳</div><div class="val" style="color:var(--amber)">${fmt(totalMonthly)}</div></div>
  </div>

  <div class="section-title">貸款 / 借款</div>
  ${debts.length===0?`<div class="card"><div class="empty"><div class="icon">✅</div>沒有負債，很棒！</div></div>`:''}
  ${debts.map(d=>{
    const pct = d.total>0?Math.min(100,Math.round(((d.total-d.remaining)/d.total)*100)):0;
    const typeColor = {信用卡:'red',分期貸款:'amber',私人借款:'purple',其他:'gray'}[d.debtType]||'gray';
    return `<div class="card">
      <div class="card-row" style="margin-bottom:8px">
        <div>
          <div style="font-weight:600;font-size:15px">${d.name}</div>
          <span class="chip ${typeColor}" style="margin-top:4px;display:inline-flex">${d.debtType}</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:700;color:var(--red)">${fmt(d.remaining)}</div>
          ${d.monthly?`<div style="font-size:11px;color:var(--text3)">每月 ${fmt(d.monthly)}</div>`:''}
        </div>
      </div>
      ${d.total?`<div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--green)"></div></div>
        <div class="progress-labels"><span>已還 ${pct}%</span><span>總額 ${fmt(d.total)}</span></div>
      </div>`:''}

function delDebt(id){ if(!confirm('刪除？'))return; debts=debts.filter(d=>d.id!==id); saveAll(); renderDebt(); }

  </div>

  <div class="section-title">我的資產</div>
  ${assets.length===0?`<div class="card"><div class="empty"><div class="icon">💰</div>尚未新增資產</div></div>`:''}

      <div class="item-icon" style="background:var(--green-bg)">${{存款:'🏦','股票/ETF':'📈',基金:'📊',現金:'💵',其他:'💰'}[a.assetType]||'💰'}</div>
      <div class="item-body"><div class="item-title">${a.name}</div><div class="item-sub"><span class="chip ${typeColor}">${a.assetType}</span></div></div>
      <div class="item-right"><div class="item-amount" style="color:var(--green)">${fmt(a.amount)}</div></div>

  }).join('')}</div>`:''}
  <button class="btn-add" onclick="openAddAsset()">+ 新增資產</button>

  <div class="section-title">存錢目標</div>
  ${goals.length===0?`<div class="card"><div class="empty"><div class="icon">🎯</div>設定一個存錢目標吧</div></div>`:''}
  ${goals.map(g=>{
    const pct=Math.min(100,Math.round((g.saved/g.target)*100));
    return `<div class="card">
      <div class="card-row">
        <span style="font-weight:600">${g.name}</span>
        <span class="chip ${pct>=100?'green':'blue'}">${pct}%</span>
      </div>
      <div style="margin:4px 0;font-size:12px;color:var(--text2)">目標 ${fmt(g.target)}</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct>=100?'var(--green)':'var(--blue)'}"></div></div>
        <div class="progress-labels"><span>已存 ${fmt(g.saved)}</span><span>還差 ${fmt(Math.max(0,g.target-g.saved))}</span></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input type="number" placeholder="追加金額" id="add-goal-${g.id}" style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text)">
        <button onclick="addToGoal('${g.id}')" style="padding:8px 14px;background:var(--text);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer">追加</button>

function delAsset(id){ if(!confirm('刪除？'))return; assets=assets.filter(a=>a.id!==id); saveAll(); renderAssets(); }
function delGoal(id){ if(!confirm('刪除？'))return; goals=goals.filter(g=>g.id!==id); saveAll(); renderAssets(); }
function addToGoal(id){
  const inp=document.getElementById('add-goal-'+id);
  const v=parseFloat(inp.value);
  if(!v||v<=0){alert('請輸入有效金額');return;}
  const g=goals.find(g=>g.id===id);
  if(g){ g.saved=(g.saved||0)+v; saveAll(); renderAssets(); }
}

function toggleTodo(id){ const t=todos.find(t=>t.id===id); if(t){t.done=!t.done;saveAll();renderMore();} }
function delTodo(id){ if(!confirm('刪除？'))return; todos=todos.filter(t=>t.id!==id); saveAll(); renderMore(); }

// Rate tool
const PAIRS = [
  {from:'TWD',to:'USD',label:'台幣→美元'},
  {from:'TWD',to:'JPY',label:'台幣→日圓'},
  {from:'TWD',to:'EUR',label:'台幣→歐元'},
  {from:'TWD',to:'CNY',label:'台幣→人民幣'},
];
let selectedPair = 0;
let rates = {};
let ratesLoaded = false;

function renderRateGrid(){
  const grid = document.getElementById('rate-grid');
  if(!grid) return;
  grid.innerHTML = PAIRS.map((p,i)=>`
    <div class="rate-item ${i===selectedPair?'active':''}" onclick="selectPair(${i})">
      <div class="pair">${p.from}/${p.to}</div>
      <div class="rate-val">${rates[p.to]?rates[p.to].toFixed(2):'—'}</div>
    </div>`).join('');
  const p = PAIRS[selectedPair];
  document.getElementById('rate-from-label').textContent = p.from;
  document.getElementById('rate-to-label').textContent = p.to;
  if(!ratesLoaded) fetchRates();
  else calcRate();
}

function selectPair(i){ selectedPair=i; renderRateGrid(); }

function fetchRates(){
  fetch('https://api.exchangerate-api.com/v4/latest/TWD')
    .then(r=>r.json())
    .then(d=>{
      rates={USD:d.rates.USD,JPY:d.rates.JPY,EUR:d.rates.EUR,CNY:d.rates.CNY};
      ratesLoaded=true;
      const el=document.getElementById('rate-updated');
      if(el) el.textContent='匯率更新於 '+new Date().toLocaleTimeString('zh-TW');
      renderRateGrid();
    })
    .catch(()=>{
      const el=document.getElementById('rate-updated');
      if(el) el.textContent='無法取得即時匯率（請連網）';
    });
}

function calcRate(){
  const p=PAIRS[selectedPair];
  const rate=rates[p.to];
  if(!rate){return;}
  const val=parseFloat(document.getElementById('rate-from').value)||0;
  const res=(val*rate).toFixed(2);
  const el=document.getElementById('rate-result');
  if(el) el.textContent=res+' '+p.to;
}
